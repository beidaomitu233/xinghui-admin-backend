    #     domain: https://xinghui.oss-cn-beijing.aliyuncs.com/
    #     base-path: upload/

    # ========== 腾讯云 COS（按需启用） ==========
    # tencent-cos:
    #   - platform: tencent-cos-1
    #     enable-storage: false
    #     access-key: your_secret_id
    #     secret-key: your_secret_key
    #     end-point: cos.ap-beijing.myqcloud.com
